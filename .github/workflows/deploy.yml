name: Deploy to Plesk via FTP

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Sitemap
        run: node scripts/generate-sitemap.js

      - name: Verify sitemap
        run: |
          echo "Generated sitemap.xml:"
          head -20 sitemap.xml

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          timeout: 60000
          security: loose
          local-dir: ./
          server-dir: /httpdocs/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/scripts/**
            **/.vscode/**
            **/.gitignore
            **/CLAUDE.md
            **/README*
