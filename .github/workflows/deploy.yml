name: Deploy to Plesk via FTP

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate Sitemap
        run: node scripts/generate-sitemap.js

      - name: Verify sitemap
        run: |
          echo "Generated sitemap.xml:"
          head -20 sitemap.xml

      - name: Deploy via LFTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          printf 'machine %s login %s password %s\n' "$FTP_HOST" "$FTP_USER" "$FTP_PASS" > ~/.netrc
          chmod 600 ~/.netrc
          lftp "$FTP_HOST" -e "
            set ftp:ssl-allow yes
            set ftp:ssl-force no
            set ssl:verify-certificate no
            set ssl:check-hostname no
            set net:timeout 120
            set net:max-retries 5
            set net:reconnect-interval-base 5
            set ftp:passive-mode yes
            mirror --reverse --delete --verbose --exclude-glob .git/ --exclude-glob .github/ --exclude-glob node_modules/ --exclude-glob scripts/ --exclude-glob CLAUDE.md --exclude-glob README.md ./ /httpdocs/
            quit
          "
          rm -f ~/.netrc
